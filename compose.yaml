services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edu_grader}
      POSTGRES_USER: ${POSTGRES_USER:-edu_grader}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu_grader} -d ${POSTGRES_DB:-edu_grader}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD:?set_KEYCLOAK_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_POSTGRES_USER:-keycloak} -d ${KEYCLOAK_POSTGRES_DB:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:?set_KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set_KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD:?set_KEYCLOAK_POSTGRES_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy

  languagetool:
    build:
      context: ./infra/languagetool
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8010/v2/languages > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  grader:
    build:
      context: .
      dockerfile: ./services/grader/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      GRADER_MATH_CPU_SECONDS: ${GRADER_MATH_CPU_SECONDS:-1}
      GRADER_MATH_MEMORY_BYTES: ${GRADER_MATH_MEMORY_BYTES:-536870912}
      GRADER_MATH_TIMEOUT_SECONDS: ${GRADER_MATH_TIMEOUT_SECONDS:-1}
      LANGUAGETOOL_BASE_URL: ${LANGUAGETOOL_BASE_URL:-http://languagetool:8010/v2}
      LANGUAGETOOL_TIMEOUT_SECONDS: ${LANGUAGETOOL_TIMEOUT_SECONDS:-2}
      ENGLISH_EMBEDDING_MODEL_DIRECTORY: ${ENGLISH_EMBEDDING_MODEL_DIRECTORY:-/opt/english-model}
      ENGLISH_EMBEDDING_MODEL_ID: ${ENGLISH_EMBEDDING_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}
      ENGLISH_EMBEDDING_MODEL_REVISION: ${ENGLISH_EMBEDDING_MODEL_REVISION:-1110a243fdf4706b3f48f1d95db1a4f5529b4d41}
      ENGLISH_EMBEDDING_MODEL_DIGEST: ${ENGLISH_EMBEDDING_MODEL_DIGEST:-sha256:84714cdabb16d132cbe6e1a4cbd21167abd09eccbdaf69dd053136ae68cc7c17}
      PROCESSOR_ALLOWED_HOSTS: ${PROCESSOR_ALLOWED_HOSTS:-grader,languagetool,localhost}
    cpus: 0.50
    mem_limit: ${GRADER_MEMORY_LIMIT:-1536m}
    pids_limit: 64
    ports:
      - "${GRADER_PORT:-8010}:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    depends_on:
      languagetool:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:?set_DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GRADER_BASE_URL: ${GRADER_BASE_URL:-http://grader:8010}
      OIDC_ISSUER: ${OIDC_ISSUER:-http://keycloak:8080/realms/edu-grader}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-edu-grader-api}
      OIDC_SCHOOL_ID_CLAIM: ${OIDC_SCHOOL_ID_CLAIM:-school_id}
      OIDC_TENANT_SLUG: ${OIDC_TENANT_SLUG:-pilot}
      BOOTSTRAP_ADMIN_SUB: ${BOOTSTRAP_ADMIN_SUB:-}
      BOOTSTRAP_ADMIN_TENANT_SLUG: ${BOOTSTRAP_ADMIN_TENANT_SLUG:-}
      AUDIT_HMAC_KEY: ${AUDIT_HMAC_KEY:?set_AUDIT_HMAC_KEY}
      AUDIT_HMAC_KEY_VERSION: ${AUDIT_HMAC_KEY_VERSION:-dev-1}
      PROCESSOR_ALLOWED_HOSTS: ${PROCESSOR_ALLOWED_HOSTS:-grader,languagetool,localhost}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      grader:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./apps/web
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
