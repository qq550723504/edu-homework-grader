[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "edu-grader-processor-policy"
version = "0.1.0"
description = "Shared outbound processor policy for Edu Homework Grader"
requires-python = ">=3.12"

[tool.setuptools.packages.find]
where = ["src"]
