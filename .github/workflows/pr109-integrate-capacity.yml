name: PR 109 capacity finalizer

on:
  push:
    branches:
      - agent/verification-capacity-v1

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verification-capacity-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Complete production routing and release evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          review_path = Path('apps/api/src/edu_grader_api/services/ai_question_review.py')
          review = review_path.read_text(encoding='utf-8')
          review = replace_once(
              review,
              'from .question_verification import VerificationGraderClient, run_candidate_verification\n',
              'from .capacity_aware_verification import run_capacity_aware_candidate_verification\nfrom .question_verification import VerificationGraderClient\n',
              'review verifier import',
          )
          call = 'validation_run = run_candidate_verification('
          if review.count(call) != 2:
              raise SystemExit(f'review verifier calls: expected 2, found {review.count(call)}')
          review = review.replace(
              call,
              'validation_run = run_capacity_aware_candidate_verification(',
          )
          review_path.write_text(review, encoding='utf-8')

          verification_path = Path(
              'apps/api/src/edu_grader_api/services/question_verification.py'
          )
          verification = verification_path.read_text(encoding='utf-8')
          verification = replace_once(
              verification,
              'VALIDATOR_VERSION = "verification-v8"\nRULESET_VERSION = "rules-v8"',
              'VALIDATOR_VERSION = "verification-v9"\nRULESET_VERSION = "rules-v9"',
              'verification contract version',
          )
          verification_path.write_text(verification, encoding='utf-8')

          capacity_path = Path(
              'apps/api/src/edu_grader_api/services/verification_capacity.py'
          )
          capacity = capacity_path.read_text(encoding='utf-8')
          capacity = replace_once(
              capacity,
              '    except (RecursionError, TypeError, ValueError):\n        return None\n',
              '    except (RecursionError, TypeError, UnicodeEncodeError, ValueError):\n        return None\n',
              'Unicode serialization failure',
          )
          capacity_path.write_text(capacity, encoding='utf-8')

          settings_path = Path('apps/api/src/edu_grader_api/settings.py')
          settings_text = settings_path.read_text(encoding='utf-8')
          timeout_block = '''    verification_total_timeout_seconds: float = Field(
        default=30.0,
        gt=0,
        le=120,
        validation_alias="VERIFICATION_TOTAL_TIMEOUT_SECONDS",
    )
'''
          if timeout_block in settings_text:
              settings_text = settings_text.replace(timeout_block, '', 1)
          settings_path.write_text(settings_text, encoding='utf-8')

          question_tests_path = Path('apps/api/tests/test_question_verification.py')
          question_tests = question_tests_path.read_text(encoding='utf-8')
          question_tests = question_tests.replace('"verification-v8"', '"verification-v9"')
          question_tests = question_tests.replace('"rules-v8"', '"rules-v9"')
          question_tests_path.write_text(question_tests, encoding='utf-8')

          wrapper_tests_path = Path('apps/api/tests/test_capacity_aware_verification.py')
          wrapper_tests = wrapper_tests_path.read_text(encoding='utf-8')
          marker = 'def test_review_service_has_no_direct_core_verification_bypass'
          if marker not in wrapper_tests:
              wrapper_tests += r'''


def test_review_service_has_no_direct_core_verification_bypass() -> None:
    import inspect

    from edu_grader_api.services import ai_question_review

    source = inspect.getsource(ai_question_review)
    assert "run_candidate_verification(" not in source
    assert source.count("run_capacity_aware_candidate_verification(") == 2
'''
          wrapper_tests_path.write_text(wrapper_tests, encoding='utf-8')

          capacity_tests_path = Path('apps/api/tests/test_verification_capacity.py')
          capacity_tests = capacity_tests_path.read_text(encoding='utf-8')
          marker = 'def test_lone_unicode_surrogate_fails_closed_without_content'
          if marker not in capacity_tests:
              capacity_tests += r'''


def test_exact_prompt_limit_is_allowed() -> None:
    evaluation = evaluate_verification_capacity(
        candidate(prompt="x" * MAX_PROMPT_CHARS)
    )

    assert "prompt_chars" not in evaluation.violations


def test_lone_unicode_surrogate_fails_closed_without_content() -> None:
    evaluation = evaluate_verification_capacity(candidate(prompt="\ud800"))

    assert evaluation.load_bucket == "invalid"
    assert [finding.code for finding in evaluation.findings] == [
        "candidate_capacity_payload_invalid"
    ]
    assert evaluation.findings[0].evidence == {
        "ruleset_version": VERIFICATION_CAPACITY_RULESET_VERSION,
        "reason": "candidate_not_serializable",
    }
'''
          capacity_tests_path.write_text(capacity_tests, encoding='utf-8')

          source_root = Path('apps/api/src/edu_grader_api')
          bypasses: list[str] = []
          for source_path in source_root.rglob('*.py'):
              if source_path.name in {
                  'question_verification.py',
                  'capacity_aware_verification.py',
              }:
                  continue
              source = source_path.read_text(encoding='utf-8')
              if 'run_candidate_verification(' in source:
                  bypasses.append(str(source_path))
          if bypasses:
              raise SystemExit(f'direct core verification bypasses remain: {bypasses}')

          evidence_path = Path('docs/status-evidence.json')
          evidence = json.loads(evidence_path.read_text(encoding='utf-8'))
          contract = evidence['generation_contract']
          contract['validator_version'] = 'verification-v9'
          contract['ruleset_version'] = 'rules-v9'
          contract['verification_capacity_rules_version'] = 'verification-capacity-v1'
          evidence_path.write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )

          project_path = Path('docs/project-status.md')
          project = project_path.read_text(encoding='utf-8')
          project = replace_once(
              project,
              '验证器已加入版本化年级复杂度、Objective prerequisite 图门禁和显式数学语义支持矩阵',
              '验证器已加入版本化年级复杂度、Objective prerequisite 图门禁、显式数学语义支持矩阵和外部依赖前容量预检',
              'project capacity capability',
          )
          project = replace_once(
              project,
              '容量 SLO、正式阈值、生产报告和发布环境验收仍缺',
              '总验证预算、P95 基线、正式阈值、生产报告和发布环境验收仍缺',
              'project remaining capacity scope',
          )
          project = project.replace(
              '| Validator | `verification-v8` |',
              '| Validator | `verification-v9` |',
          ).replace(
              '| Ruleset | `rules-v8` |',
              '| Ruleset | `rules-v9` |',
          )
          project = replace_once(
              project,
              '| Math semantics rules | `math-semantics-v1` |',
              '| Math semantics rules | `math-semantics-v1` |\n| Verification capacity rules | `verification-capacity-v1` |',
              'project capacity version',
          )
          project = replace_once(
              project,
              '| #83 | 开放：年级复杂度、Objective prerequisite 与数学语义门禁已实现；仍缺容量边界。 |',
              '| #83 | 开放：载荷预检与 Grader HTTP timeout 已实现；仍缺总验证预算、细分超时和 P95 基线。 |',
              'project issue 83 status',
          )
          project_path.write_text(project, encoding='utf-8')

          roadmap_path = Path('docs/roadmap.md')
          roadmap = roadmap_path.read_text(encoding='utf-8')
          roadmap = replace_once(
              roadmap,
              '- [x] PR #107 / #106：`math-semantics-v1` 显式支持矩阵与专用阻断门禁；\n- [ ] #83：剩余验证容量、超时和 P95 SLO；',
              '- [x] PR #107 / #106：`math-semantics-v1` 显式支持矩阵与专用阻断门禁；\n- [x] PR #109 / #108：`verification-capacity-v1` 载荷预检、脱敏信号和显式 Grader HTTP timeout；\n- [ ] #83：剩余总验证预算、细分依赖超时和 P95 性能基线；',
              'roadmap capacity status',
          )
          roadmap_path.write_text(roadmap, encoding='utf-8')
          PY
      - name: Format, lint, and run full regression suite
        shell: bash
        run: |
          set -euo pipefail
          make install-python >/dev/null
          python -m ruff format \
            apps/api/src/edu_grader_api/routers/ai_question_validation.py \
            apps/api/src/edu_grader_api/services/ai_question_review.py \
            apps/api/src/edu_grader_api/services/capacity_aware_verification.py \
            apps/api/src/edu_grader_api/services/grader.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/src/edu_grader_api/services/verification_capacity.py \
            apps/api/src/edu_grader_api/settings.py \
            apps/api/tests/test_capacity_aware_verification.py \
            apps/api/tests/test_grader_timeout.py \
            apps/api/tests/test_question_verification.py \
            apps/api/tests/test_verification_capacity.py
          python -m ruff check --config ruff.toml \
            apps/api/src/edu_grader_api/routers/ai_question_validation.py \
            apps/api/src/edu_grader_api/services/ai_question_review.py \
            apps/api/src/edu_grader_api/services/capacity_aware_verification.py \
            apps/api/src/edu_grader_api/services/grader.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/src/edu_grader_api/services/verification_capacity.py \
            apps/api/src/edu_grader_api/settings.py \
            apps/api/tests/test_capacity_aware_verification.py \
            apps/api/tests/test_grader_timeout.py \
            apps/api/tests/test_question_verification.py \
            apps/api/tests/test_verification_capacity.py
          make test
          make verification-regression
          python scripts/check_docs_status.py
      - name: Remove one-shot assets and push reviewable branch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/docs-integrity.yml > .github/workflows/docs-integrity.yml
          git rm -f .github/workflows/pr109-integrate-capacity.yml
          git rm -f .github/.pr109-integrate-trigger
          git rm -f apps/web/e2e/pr109-locate-verification-callers.spec.ts
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: finalize verification capacity preflight'
          git push origin HEAD:agent/verification-capacity-v1
