name: PR 107 full Python test diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.event.pull_request.number == 107
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install Python packages
        run: make install-python >/dev/null
      - name: Capture full Python test output
        shell: bash
        run: |
          set +e
          mkdir -p pr107-full-test
          make test > pr107-full-test/pytest.log 2>&1
          status=$?
          printf 'test_status=%s\n' "$status" > pr107-full-test/status.txt
          exit 0
      - name: Upload full-test diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pr107-full-test-diagnostics
          path: pr107-full-test
