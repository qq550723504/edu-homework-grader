name: Governance test version autofix

on:
  push:
    branches:
      - codex/ai-generation-governance-pr5

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/ai-generation-governance-pr5
      - name: Replace hard-coded Prompt versions in governance tests
        run: |
          python - <<'PY'
          from pathlib import Path

          service_test = Path('apps/api/tests/test_generation_service.py')
          text = service_test.read_text(encoding='utf-8')
          text = text.replace(
              'from edu_grader_api.services.generation import (\n    GenerationJobRequest,',
              'from edu_grader_api.services.generation import (\n    GENERATION_PROMPT_VERSION,\n    GenerationJobRequest,',
          )
          text = text.replace('"generator-v2"', 'GENERATION_PROMPT_VERSION')
          service_test.write_text(text, encoding='utf-8')

          api_test = Path('apps/api/tests/test_ai_question_generation_api.py')
          text = api_test.read_text(encoding='utf-8')
          anchor = 'import edu_grader_api.services.question_verification as question_verification\n'
          replacement = (
              'from edu_grader_api.services.generation import GENERATION_PROMPT_VERSION\n'
              + anchor
          )
          if 'from edu_grader_api.services.generation import GENERATION_PROMPT_VERSION' not in text:
              text = text.replace(anchor, replacement)
          text = text.replace('"generator-v2"', 'GENERATION_PROMPT_VERSION')
          api_test.write_text(text, encoding='utf-8')
          PY
      - name: Commit normalized tests
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/tests/test_generation_service.py apps/api/tests/test_ai_question_generation_api.py
          git commit -m "test(governance): use production Prompt version constant"
          git push origin HEAD:codex/ai-generation-governance-pr5
