name: Docs integrity

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-integrity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-integrity:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/objective-prerequisite-verification-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Format, test, synchronize, and restore workflow
        shell: bash
        run: |
          set -euo pipefail
          make install-python >/dev/null
          python -m ruff format \
            services/generator/src/edu_generator/providers.py \
            apps/api/src/edu_grader_api/services/objective_prerequisites.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py
          python -m ruff check --config ruff.toml \
            services/generator/src/edu_generator/providers.py \
            apps/api/src/edu_grader_api/services/objective_prerequisites.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py
          python -m pytest \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py -q
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/roadmap.md')
          text = path.read_text(encoding='utf-8')
          old = '''- [x] PR #103：版本化 Profile/年级复杂度规则、E3/E4 语言篇幅信号、M1/M2 数值复杂度与 `verification-v6` / `rules-v6`；
- [ ] #83：剩余 Objective prerequisite、数学多解/定义域/增根漏根语义和容量 SLO；'''
          new = '''- [x] PR #103：版本化 Profile/年级复杂度规则、E3/E4 语言篇幅信号与 M1/M2 数值复杂度；
- [x] PR #105：Objective prerequisite 传递闭包门禁、稳定 finding 和 `verification-v7` / `rules-v7`；
- [ ] #83：剩余数学多解/定义域/增根漏根语义和容量 SLO；'''
          if text.count(old) != 1:
              raise SystemExit('roadmap implementation status did not match expected baseline')
          text = text.replace(old, new, 1)
          if text.count('#83 课程/数学语义边界 ─┐') != 1:
              raise SystemExit('roadmap dependency label did not match expected baseline')
          text = text.replace('#83 课程/数学语义边界 ─┐', '#83 数学语义/容量边界 ─┐', 1)
          path.write_text(text, encoding='utf-8')
          PY
          git fetch origin main
          git show origin/main:.github/workflows/docs-integrity.yml > .github/workflows/docs-integrity.yml
          git rm -f .github/workflows/pr105-format-and-test.yml || true
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: finalize objective prerequisite verification'
          git push origin HEAD:agent/objective-prerequisite-verification-v1
