name: Docs integrity

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-integrity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install pinned Python toolchain
        run: make install-python >/dev/null
      - name: Capture exact Ruff changes
        run: |
          mkdir -p pr105-format
          python -m ruff format \
            services/generator/src/edu_generator/providers.py \
            apps/api/src/edu_grader_api/services/objective_prerequisites.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py
          git diff --name-only -- \
            services/generator/src/edu_generator/providers.py \
            apps/api/src/edu_grader_api/services/objective_prerequisites.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py \
            > pr105-format/changed-files.txt
          git diff --binary -- \
            services/generator/src/edu_generator/providers.py \
            apps/api/src/edu_grader_api/services/objective_prerequisites.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py \
            > pr105-format/ruff-format.patch
      - name: Upload exact Ruff diff
        uses: actions/upload-artifact@v4
        with:
          name: pr105-ruff-diff
          path: pr105-format
      - name: Validate links, evidence, versions, policies, and CI jobs
        run: python scripts/check_docs_status.py
