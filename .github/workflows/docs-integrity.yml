name: Docs integrity

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-integrity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Validate links, evidence, versions, policies, and CI jobs
        run: python scripts/check_docs_status.py
