name: Docs integrity

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-integrity-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docs-integrity:
    if: github.event.pull_request.number == 109 && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Integrate capacity preflight before recursive and external work
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          verification_path = Path(
              "apps/api/src/edu_grader_api/services/question_verification.py"
          )
          text = verification_path.read_text(encoding="utf-8")
          text = replace_once(
              text,
              '''from .question_fingerprints import FINGERPRINT_VERSION, PromptFingerprints, fingerprint_prompt
from .questions import GradeResult
''',
              '''from .question_fingerprints import FINGERPRINT_VERSION, PromptFingerprints, fingerprint_prompt
from .questions import GradeResult
from .verification_capacity import (
    evaluate_verification_capacity,
    unavailable_verification_capacity_signal,
)
''',
              "capacity import",
          )
          text = replace_once(
              text,
              'VALIDATOR_VERSION = "verification-v8"\nRULESET_VERSION = "rules-v8"',
              'VALIDATOR_VERSION = "verification-v9"\nRULESET_VERSION = "rules-v9"',
              "validator version",
          )
          text = replace_once(
              text,
              '''    objective_prerequisite_signal: dict[str, object]
    math_semantics_signal: dict[str, object]
''',
              '''    objective_prerequisite_signal: dict[str, object]
    math_semantics_signal: dict[str, object]
    verification_capacity_signal: dict[str, object]
''',
              "candidate evaluation capacity field",
          )

          function_start = text.index("def run_candidate_verification(")
          body_start = text.index(
              "    candidate = deepcopy(revision.candidate_json)\n", function_start
          )
          body_end = text.index("    return _persist_run(\n", body_start)
          new_body = '''    raw_candidate = revision.candidate_json
    try:
        capacity_evaluation = evaluate_verification_capacity(raw_candidate)
    except Exception:
        evaluation = _CandidateEvaluation(
            findings=[
                VerificationFinding(
                    code="validator_unavailable",
                    severity=ValidationFindingSeverity.BLOCKED,
                    evidence={"category": "capacity_preflight_unavailable"},
                    remediation=(
                        "Retry validation. If the problem continues, contact an administrator."
                    ),
                )
            ],
            duplicate_feature_summary=_unavailable_duplicate_feature_summary(
                "capacity_preflight_unavailable"
            ),
            difficulty_signal=_unavailable_difficulty_signal(),
            grade_complexity_signal=unavailable_grade_complexity_signal(
                "capacity_preflight_unavailable"
            ),
            objective_prerequisite_signal=unavailable_objective_prerequisite_signal(
                "capacity_preflight_unavailable"
            ),
            math_semantics_signal=unavailable_math_semantics_signal(
                "capacity_preflight_unavailable"
            ),
            verification_capacity_signal=unavailable_verification_capacity_signal(
                "capacity_preflight_unavailable"
            ),
        )
    else:
        capacity_signal = capacity_evaluation.feature_summary()
        if capacity_evaluation.blocked:
            evaluation = _CandidateEvaluation(
                findings=[
                    VerificationFinding(
                        code=finding.code,
                        severity=ValidationFindingSeverity.BLOCKED,
                        evidence=finding.evidence,
                        remediation=finding.remediation,
                    )
                    for finding in capacity_evaluation.findings
                ],
                duplicate_feature_summary=_unavailable_duplicate_feature_summary(
                    "capacity_preflight_blocked"
                ),
                difficulty_signal=_unavailable_difficulty_signal(),
                grade_complexity_signal=unavailable_grade_complexity_signal(
                    "capacity_preflight_blocked"
                ),
                objective_prerequisite_signal=unavailable_objective_prerequisite_signal(
                    "capacity_preflight_blocked"
                ),
                math_semantics_signal=unavailable_math_semantics_signal(
                    "capacity_preflight_blocked"
                ),
                verification_capacity_signal=capacity_signal,
            )
        else:
            duplicate_feature_summary = _unavailable_duplicate_feature_summary(
                "candidate_not_evaluated"
            )
            try:
                candidate = deepcopy(raw_candidate)
                duplicate_threshold = _validated_duplicate_threshold()
                prompt = candidate.get("prompt")
                duplicate_snapshot = _empty_duplicate_snapshot(
                    duplicate_threshold,
                    prompt if isinstance(prompt, str) else "",
                )
                duplicate_feature_summary = _duplicate_feature_summary(duplicate_snapshot)
                job = session.get(GenerationJob, draft.job_id)
                if job is not None and isinstance(prompt, str):
                    duplicate_snapshot = _capture_duplicate_snapshot(
                        session,
                        draft=draft,
                        tenant_id=job.tenant_id,
                        prompt=prompt,
                        threshold=duplicate_threshold,
                    )
                    duplicate_feature_summary = _duplicate_feature_summary(
                        duplicate_snapshot
                    )
                evaluation = _evaluate_candidate(
                    session,
                    draft=draft,
                    candidate=candidate,
                    grader_client=grader_client,
                    duplicate_snapshot=duplicate_snapshot,
                    verification_capacity_signal=capacity_signal,
                )
            except Exception:
                evaluation = _CandidateEvaluation(
                    findings=[
                        VerificationFinding(
                            code="validator_unavailable",
                            severity=ValidationFindingSeverity.BLOCKED,
                            evidence={"category": "internal_validation_error"},
                            remediation=(
                                "Retry validation. If the problem continues, contact an administrator."
                            ),
                        )
                    ],
                    duplicate_feature_summary=duplicate_feature_summary,
                    difficulty_signal=_unavailable_difficulty_signal(),
                    grade_complexity_signal=unavailable_grade_complexity_signal(
                        "validator_unavailable"
                    ),
                    objective_prerequisite_signal=unavailable_objective_prerequisite_signal(
                        "validator_unavailable"
                    ),
                    math_semantics_signal=unavailable_math_semantics_signal(
                        "validator_unavailable"
                    ),
                    verification_capacity_signal=capacity_signal,
                )
'''
          text = text[:body_start] + new_body + text[body_end:]
          text = replace_once(
              text,
              '''        objective_prerequisite_signal=evaluation.objective_prerequisite_signal,
        math_semantics_signal=evaluation.math_semantics_signal,
''',
              '''        objective_prerequisite_signal=evaluation.objective_prerequisite_signal,
        math_semantics_signal=evaluation.math_semantics_signal,
        verification_capacity_signal=evaluation.verification_capacity_signal,
''',
              "persist call capacity signal",
          )
          text = replace_once(
              text,
              '''    grader_client: VerificationGraderClient,
    duplicate_snapshot: _DuplicateSnapshot,
) -> _CandidateEvaluation:
''',
              '''    grader_client: VerificationGraderClient,
    duplicate_snapshot: _DuplicateSnapshot,
    verification_capacity_signal: dict[str, object],
) -> _CandidateEvaluation:
''',
              "candidate evaluator signature",
          )
          text = replace_once(
              text,
              '''        objective_prerequisite_signal=objective_prerequisite_signal,
        math_semantics_signal=math_semantics_signal,
    )
''',
              '''        objective_prerequisite_signal=objective_prerequisite_signal,
        math_semantics_signal=math_semantics_signal,
        verification_capacity_signal=verification_capacity_signal,
    )
''',
              "candidate evaluator return",
          )
          text = replace_once(
              text,
              '''    objective_prerequisite_signal: dict[str, object],
    math_semantics_signal: dict[str, object],
) -> GenerationValidationRun:
''',
              '''    objective_prerequisite_signal: dict[str, object],
    math_semantics_signal: dict[str, object],
    verification_capacity_signal: dict[str, object],
) -> GenerationValidationRun:
''',
              "persist signature",
          )
          text = replace_once(
              text,
              '''            "objective_prerequisite_signal": objective_prerequisite_signal,
            "math_semantics_signal": math_semantics_signal,
            **duplicate_feature_summary,
''',
              '''            "objective_prerequisite_signal": objective_prerequisite_signal,
            "math_semantics_signal": math_semantics_signal,
            "verification_capacity_signal": verification_capacity_signal,
            **duplicate_feature_summary,
''',
              "persisted capacity signal",
          )
          helper_marker = '''def _empty_duplicate_snapshot(threshold: float, prompt: str) -> _DuplicateSnapshot:
'''
          helper = '''def _unavailable_duplicate_feature_summary(reason: str) -> dict[str, object]:
    return {
        "fingerprint_version": FINGERPRINT_VERSION,
        "candidate_prompt_fingerprint": None,
        "similarity_threshold": None,
        "comparison_counts": {"published_question": 0, "batch_candidate": 0},
        "embedding_dependency": None,
        "duplicate_check_availability": "unavailable",
        "duplicate_check_reason": reason,
    }


'''
          text = replace_once(
              text,
              helper_marker,
              helper + helper_marker,
              "unavailable duplicate feature summary helper",
          )
          verification_path.write_text(text, encoding="utf-8")

          capacity_path = Path(
              "apps/api/src/edu_grader_api/services/verification_capacity.py"
          )
          capacity_text = capacity_path.read_text(encoding="utf-8")
          capacity_text = replace_once(
              capacity_text,
              '''    except (RecursionError, TypeError, ValueError):
        return None
''',
              '''    except (RecursionError, TypeError, UnicodeEncodeError, ValueError):
        return None
''',
              "UTF-8 serialization failure handling",
          )
          capacity_path.write_text(capacity_text, encoding="utf-8")

          settings_path = Path("apps/api/src/edu_grader_api/settings.py")
          settings_text = settings_path.read_text(encoding="utf-8")
          settings_text = replace_once(
              settings_text,
              '''    verification_total_timeout_seconds: float = Field(
        default=30.0,
        gt=0,
        le=120,
        validation_alias="VERIFICATION_TOTAL_TIMEOUT_SECONDS",
    )
''',
              "",
              "unused total verification timeout",
          )
          settings_path.write_text(settings_text, encoding="utf-8")

          tests_path = Path("apps/api/tests/test_question_verification.py")
          tests = tests_path.read_text(encoding="utf-8")
          tests = tests.replace('"verification-v8"', '"verification-v9"')
          tests = tests.replace('"rules-v8"', '"rules-v9"')
          tests = tests.replace(
              '''            "math_semantics_signal",
        }
''',
              '''            "math_semantics_signal",
            "verification_capacity_signal",
        }
''',
          )
          marker = "def test_capacity_preflight_runs_before_copy_fingerprint_and_dependencies"
          if marker in tests:
              raise SystemExit("capacity integration tests already present")
          tests += r'''


def test_capacity_preflight_runs_before_copy_fingerprint_and_dependencies(
    session: Session, monkeypatch: pytest.MonkeyPatch
) -> None:
    from edu_grader_api.services.verification_capacity import MAX_PROMPT_CHARS

    class ExplosiveCapacityGrader:
        def normalize_math_answer(self, answer_json: dict[str, object]) -> dict[str, object]:
            raise AssertionError("normalizer must not be called")

        def grade(
            self,
            question_type: str,
            rule_json: dict[str, object],
            answer_json: dict[str, object],
            *,
            policy_version: str | None = None,
        ) -> GradeResult:
            raise AssertionError("grader must not be called")

        def semantic_similarity(
            self, query: str, comparisons: list[str]
        ) -> SemanticSimilarityResult:
            raise AssertionError("similarity must not be called")

    candidate = valid_m1_candidate("x" * (MAX_PROMPT_CHARS + 1))
    draft = generation_draft(session, candidate_json=candidate)
    monkeypatch.setattr(
        verification,
        "deepcopy",
        lambda value: (_ for _ in ()).throw(AssertionError("copy must not run")),
    )
    monkeypatch.setattr(
        verification,
        "fingerprint_prompt",
        lambda value: (_ for _ in ()).throw(AssertionError("fingerprint must not run")),
    )

    run = verify_current_revision(
        session,
        draft=draft,
        grader_client=ExplosiveCapacityGrader(),
    )

    assert run.status is ValidationRunStatus.BLOCKED
    assert finding_codes(run) == {"candidate_capacity_limit_exceeded"}
    signal = run.feature_summary_json["verification_capacity_signal"]
    assert signal["version"] == "verification-capacity-v1"
    assert signal["violations"] == ["prompt_chars"]
    assert "x" * 100 not in json.dumps(signal)
    assert run.feature_summary_json["candidate_prompt_fingerprint"] is None
    assert run.feature_summary_json["duplicate_check_reason"] == (
        "capacity_preflight_blocked"
    )


def test_valid_candidate_persists_deidentified_capacity_signal(session: Session) -> None:
    draft = generation_draft(session)

    run = verify_current_revision(session, draft=draft, grader_client=PassingGrader())

    signal = run.feature_summary_json["verification_capacity_signal"]
    assert signal["availability"] == "available"
    assert signal["version"] == "verification-capacity-v1"
    assert signal["load_bucket"] == "small"
    assert signal["violations"] == []
    assert "What is 2 + 2?" not in json.dumps(signal)
    assert run.validator_version == "verification-v9"
    assert run.ruleset_version == "rules-v9"


def test_capacity_preflight_failure_is_persisted_fail_closed(
    session: Session, monkeypatch: pytest.MonkeyPatch
) -> None:
    draft = generation_draft(session)
    monkeypatch.setattr(
        verification,
        "evaluate_verification_capacity",
        lambda value: (_ for _ in ()).throw(RuntimeError("private candidate diagnostic")),
    )

    run = verify_current_revision(session, draft=draft, grader_client=PassingGrader())

    assert run.status is ValidationRunStatus.BLOCKED
    assert finding_codes(run) == {"validator_unavailable"}
    assert run.findings[0].evidence_json == {
        "category": "capacity_preflight_unavailable"
    }
    assert "private candidate diagnostic" not in json.dumps(run.feature_summary_json)
'''
          tests_path.write_text(tests, encoding="utf-8")

          capacity_tests_path = Path("apps/api/tests/test_verification_capacity.py")
          capacity_tests = capacity_tests_path.read_text(encoding="utf-8")
          capacity_tests = replace_once(
              capacity_tests,
              '''    MAX_READING_MATERIAL_CHARS,
    MAX_RULE_JSON_BYTES,
''',
              '''    MAX_READING_MATERIAL_CHARS,
    MAX_RULE_JSON_BYTES,
    MAX_SCORING_POINTS,
''',
              "scoring point limit test import",
          )
          capacity_tests += r'''


def test_exact_text_limit_is_allowed() -> None:
    evaluation = evaluate_verification_capacity(
        candidate(prompt="x" * MAX_PROMPT_CHARS)
    )

    assert "prompt_chars" not in evaluation.violations


def test_scoring_point_count_is_bounded() -> None:
    scoring_points = [
        {"id": str(index), "score": 1, "evidence_phrases": ["evidence"]}
        for index in range(MAX_SCORING_POINTS + 1)
    ]

    evaluation = evaluate_verification_capacity(
        candidate(question_type="E4", rule_json={"scoring_points": scoring_points})
    )

    assert "scoring_points" in evaluation.violations


def test_lone_unicode_surrogate_fails_closed_without_content() -> None:
    evaluation = evaluate_verification_capacity(candidate(prompt="\ud800"))

    assert evaluation.load_bucket == "invalid"
    assert [finding.code for finding in evaluation.findings] == [
        "candidate_capacity_payload_invalid"
    ]
    assert evaluation.findings[0].evidence == {
        "ruleset_version": VERIFICATION_CAPACITY_RULESET_VERSION,
        "reason": "candidate_not_serializable",
    }
'''
          capacity_tests_path.write_text(capacity_tests, encoding="utf-8")

          evidence_path = Path("docs/status-evidence.json")
          evidence = json.loads(evidence_path.read_text(encoding="utf-8"))
          contract = evidence["generation_contract"]
          contract["validator_version"] = "verification-v9"
          contract["ruleset_version"] = "rules-v9"
          contract["verification_capacity_rules_version"] = (
              "verification-capacity-v1"
          )
          evidence_path.write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          project_status_path = Path("docs/project-status.md")
          project_status = project_status_path.read_text(encoding="utf-8")
          project_status = replace_once(
              project_status,
              "验证器已加入版本化年级复杂度、Objective prerequisite 图门禁和显式数学语义支持矩阵",
              "验证器已加入版本化年级复杂度、Objective prerequisite 图门禁、显式数学语义支持矩阵和外部依赖前容量预检",
              "project status capability",
          )
          project_status = replace_once(
              project_status,
              "容量 SLO、正式阈值、生产报告和发布环境验收仍缺",
              "总验证超时、P95 基线、正式阈值、生产报告和发布环境验收仍缺",
              "project status remaining boundary",
          )
          project_status = project_status.replace(
              "| Validator | `verification-v8` |",
              "| Validator | `verification-v9` |",
          ).replace(
              "| Ruleset | `rules-v8` |",
              "| Ruleset | `rules-v9` |",
          )
          project_status = replace_once(
              project_status,
              "| Math semantics rules | `math-semantics-v1` |",
              "| Math semantics rules | `math-semantics-v1` |\n| Verification capacity rules | `verification-capacity-v1` |",
              "project status capacity version",
          )
          project_status = replace_once(
              project_status,
              "| #83 | 开放：年级复杂度、Objective prerequisite 与数学语义门禁已实现；仍缺容量边界。 |",
              "| #83 | 开放：确定性载荷预检和 Grader HTTP timeout 已实现；仍缺总验证预算与 P95 基线。 |",
              "project status issue 83",
          )
          project_status_path.write_text(project_status, encoding="utf-8")

          roadmap_path = Path("docs/roadmap.md")
          roadmap = roadmap_path.read_text(encoding="utf-8")
          roadmap = replace_once(
              roadmap,
              "- [x] PR #107 / #106：`math-semantics-v1` 显式支持矩阵与专用阻断门禁；\n- [ ] #83：剩余验证容量、超时和 P95 SLO；",
              "- [x] PR #107 / #106：`math-semantics-v1` 显式支持矩阵与专用阻断门禁；\n- [x] PR #109 / #108：`verification-capacity-v1` 载荷预检、脱敏容量信号和显式 Grader HTTP timeout；\n- [ ] #83：剩余总验证预算、细分依赖超时和 P95 性能基线；",
              "roadmap capacity status",
          )
          roadmap_path.write_text(roadmap, encoding="utf-8")
          PY
      - name: Format, lint, test, and validate documentation
        shell: bash
        run: |
          set -euo pipefail
          make install-python >/dev/null
          python -m ruff format \
            apps/api/src/edu_grader_api/services/verification_capacity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/src/edu_grader_api/services/grader.py \
            apps/api/src/edu_grader_api/settings.py \
            apps/api/tests/test_verification_capacity.py \
            apps/api/tests/test_grader_timeout.py \
            apps/api/tests/test_question_verification.py
          python -m ruff check --config ruff.toml \
            apps/api/src/edu_grader_api/services/verification_capacity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/src/edu_grader_api/services/grader.py \
            apps/api/src/edu_grader_api/settings.py \
            apps/api/tests/test_verification_capacity.py \
            apps/api/tests/test_grader_timeout.py \
            apps/api/tests/test_question_verification.py
          make test
          make verification-regression
          python scripts/check_docs_status.py
      - name: Restore standard workflow, remove diagnostics, and push
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:.github/workflows/docs-integrity.yml > .github/workflows/docs-integrity.yml
          git rm -f .github/workflows/pr109-integrate-capacity.yml
          git rm -f .github/.pr109-integrate-trigger
          git rm -f apps/web/e2e/pr109-locate-verification-callers.spec.ts
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: enforce verification capacity preflight'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
