name: PR 111 verification budget integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  integrate:
    if: github.event.pull_request.head.ref == 'agent/verification-budget-v1' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Route teacher review and fix terminal persistence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          review_path = Path('apps/api/src/edu_grader_api/services/ai_question_review.py')
          review = review_path.read_text(encoding='utf-8')
          old_import = (
              'from .capacity_aware_verification import '
              'run_capacity_aware_candidate_verification'
          )
          new_import = (
              'from .budget_aware_verification import '
              'run_budget_aware_candidate_verification'
          )
          if review.count(old_import) != 1:
              raise SystemExit(
                  f'ai_question_review import: expected one match, found {review.count(old_import)}'
              )
          review = review.replace(old_import, new_import, 1)
          call_count = review.count('run_capacity_aware_candidate_verification(')
          if call_count < 2:
              raise SystemExit(
                  f'ai_question_review calls: expected at least two matches, found {call_count}'
              )
          review = review.replace(
              'run_capacity_aware_candidate_verification(',
              'run_budget_aware_candidate_verification(',
          )
          review_path.write_text(review, encoding='utf-8')

          wrapper_path = Path(
              'apps/api/src/edu_grader_api/services/budget_aware_verification.py'
          )
          wrapper = wrapper_path.read_text(encoding='utf-8')
          old = '''    summary = dict(run.feature_summary_json)
    summary["verification_capacity_signal"] = unavailable_verification_capacity_signal(
        "verification_timeout"
    )
    run.feature_summary_json = summary
    return _finalize_run(session, run=run, budget=budget, terminal_finding=None)
'''
          new = '''    run.status = ValidationRunStatus.BLOCKED
    summary = dict(run.feature_summary_json)
    summary["verification_capacity_signal"] = unavailable_verification_capacity_signal(
        "verification_timeout"
    )
    run.feature_summary_json = summary
    return _finalize_run(session, run=run, budget=budget, terminal_finding=None)
'''
          if wrapper.count(old) != 1:
              raise SystemExit(
                  f'terminal persistence: expected one match, found {wrapper.count(old)}'
              )
          wrapper = wrapper.replace(old, new, 1)

          start = wrapper.index('def _finalize_run(')
          end = wrapper.index('\ndef _finding_for_terminal_budget(', start)
          replacement = '''def _finalize_run(
    session: Session,
    *,
    run: GenerationValidationRun,
    budget: VerificationBudget,
    terminal_finding: core.VerificationFinding | None,
) -> GenerationValidationRun:
    added_terminal_finding = False
    if terminal_finding is not None and not any(
        finding.code == terminal_finding.code for finding in run.findings
    ):
        session.add(
            ValidationFinding(
                validation_run_id=run.id,
                code=terminal_finding.code,
                severity=terminal_finding.severity,
                evidence_json=terminal_finding.evidence,
                remediation=terminal_finding.remediation,
            )
        )
        added_terminal_finding = True
    if terminal_finding is not None:
        run.status = ValidationRunStatus.BLOCKED

    summary = dict(run.feature_summary_json)
    summary["verification_budget_signal"] = budget.feature_summary()
    if added_terminal_finding:
        summary["finding_count"] = int(summary.get("finding_count", 0)) + 1
    run.feature_summary_json = summary
    run.validator_version = BUDGET_AWARE_VALIDATOR_VERSION
    run.ruleset_version = BUDGET_AWARE_RULESET_VERSION
    session.flush()
    return run

'''
          wrapper_path.write_text(
              wrapper[:start] + replacement + wrapper[end + 1 :],
              encoding='utf-8',
          )

          test_path = Path('apps/api/tests/test_budget_aware_verification.py')
          tests = test_path.read_text(encoding='utf-8')
          if tests.count(
              'assert persisted.status is ValidationRunStatus.PASSED'
          ) != 1:
              raise SystemExit('expected one terminal status assertion')
          tests = tests.replace(
              'assert persisted.status is ValidationRunStatus.PASSED',
              'assert persisted.status is ValidationRunStatus.BLOCKED',
              1,
          )
          test_path.write_text(tests, encoding='utf-8')
          PY
      - name: Format and run focused regression tests
        shell: bash
        run: |
          set -euo pipefail
          make install-python >/dev/null
          python -m ruff format \
            apps/api/src/edu_grader_api/routers/ai_question_validation.py \
            apps/api/src/edu_grader_api/services/ai_question_review.py \
            apps/api/src/edu_grader_api/services/verification_budget.py \
            apps/api/src/edu_grader_api/services/budget_aware_verification.py \
            apps/api/tests/test_verification_budget.py \
            apps/api/tests/test_budget_aware_verification.py \
            apps/api/tests/test_verification_budget_public_api.py \
            apps/api/tests/test_verification_budget_settings.py
          python -m ruff check --config ruff.toml \
            apps/api/src/edu_grader_api/routers/ai_question_validation.py \
            apps/api/src/edu_grader_api/services/ai_question_review.py \
            apps/api/src/edu_grader_api/services/verification_budget.py \
            apps/api/src/edu_grader_api/services/budget_aware_verification.py \
            apps/api/tests/test_verification_budget.py \
            apps/api/tests/test_budget_aware_verification.py \
            apps/api/tests/test_verification_budget_public_api.py \
            apps/api/tests/test_verification_budget_settings.py
          python -m pytest \
            apps/api/tests/test_verification_budget.py \
            apps/api/tests/test_budget_aware_verification.py \
            apps/api/tests/test_verification_budget_public_api.py \
            apps/api/tests/test_verification_budget_settings.py \
            apps/api/tests/test_ai_question_review.py \
            apps/api/tests/test_ai_question_validation.py -q
      - name: Remove one-shot workflow and push
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/pr111-integrate-budget.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: route teacher validation through shared budget'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
