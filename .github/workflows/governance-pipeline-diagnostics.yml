name: Governance pipeline diagnostics

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: make install-python
      - name: Capture Python tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          make test 2>&1 | tee python-tests.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: governance-pipeline-diagnostics
          path: python-tests.txt
          retention-days: 2
      - if: steps.tests.outcome == 'failure'
        run: exit 1
