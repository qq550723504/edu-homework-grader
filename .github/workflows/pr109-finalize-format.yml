name: PR 109 finalize formatting

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.number == 109 && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Apply pinned Ruff formatting
        shell: bash
        run: |
          set -euo pipefail
          make install-python >/dev/null
          python -m ruff format \
            apps/api/src/edu_grader_api/routers/ai_question_validation.py \
            apps/api/src/edu_grader_api/services/ai_question_review.py \
            apps/api/src/edu_grader_api/services/capacity_aware_verification.py \
            apps/api/src/edu_grader_api/services/grader.py \
            apps/api/src/edu_grader_api/services/verification_capacity.py \
            apps/api/src/edu_grader_api/settings.py \
            apps/api/tests/test_capacity_aware_verification.py \
            apps/api/tests/test_grader_timeout.py \
            apps/api/tests/test_verification_capacity.py \
            apps/api/tests/test_verification_capacity_boundaries.py
          python -m ruff check --config ruff.toml \
            apps/api/src/edu_grader_api/routers/ai_question_validation.py \
            apps/api/src/edu_grader_api/services/ai_question_review.py \
            apps/api/src/edu_grader_api/services/capacity_aware_verification.py \
            apps/api/src/edu_grader_api/services/grader.py \
            apps/api/src/edu_grader_api/services/verification_capacity.py \
            apps/api/src/edu_grader_api/settings.py \
            apps/api/tests/test_capacity_aware_verification.py \
            apps/api/tests/test_grader_timeout.py \
            apps/api/tests/test_verification_capacity.py \
            apps/api/tests/test_verification_capacity_boundaries.py
      - name: Run focused regression tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest \
            apps/api/tests/test_verification_capacity.py \
            apps/api/tests/test_verification_capacity_boundaries.py \
            apps/api/tests/test_capacity_aware_verification.py \
            apps/api/tests/test_grader_timeout.py -q
          python scripts/check_docs_status.py
      - name: Remove workflow and push formatted sources
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/pr109-finalize-format.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: apply pinned Ruff formatting to capacity preflight'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
