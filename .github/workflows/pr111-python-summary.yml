name: PR 111 Python failure summary

on:
  push:
    branches:
      - agent/verification-budget-v1

permissions:
  actions: read
  contents: write
  issues: write

jobs:
  summarize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verification-budget-v1
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Replace diagnostic comment with concise failure summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api -H 'Accept: application/vnd.github+json' \
            "repos/$REPO/actions/jobs/89549670796/logs" > /tmp/python.log
          {
            echo '### PR #111 latest Python failure summary'
            echo
            echo '```text'
            grep -E '(^|Z )(FAILED|ERROR|E +|=+ short test summary info =+|[A-Za-z]+Error:|Failed:)' /tmp/python.log \
              | tail -n 140 \
              | sed -E 's/^.*Z //' || true
            echo '```'
          } > /tmp/comment.md
          jq -n --rawfile body /tmp/comment.md '{body:$body}' > /tmp/payload.json
          gh api --method PATCH \
            -H 'Accept: application/vnd.github+json' \
            "repos/$REPO/issues/comments/5072680534" \
            --input /tmp/payload.json
      - name: Self-delete
        run: |
          set -euo pipefail
          rm -f .github/workflows/pr111-python-summary.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove completed Python failure summary'
          git push origin HEAD:agent/verification-budget-v1
