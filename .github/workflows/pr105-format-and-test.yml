name: PR 105 format and focused test

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  format-and-test:
    if: github.event.pull_request.number == 105 && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Format, synchronize roadmap, and test
        shell: bash
        run: |
          set -euo pipefail
          make install-python >/dev/null
          python -m ruff format \
            services/generator/src/edu_generator/providers.py \
            apps/api/src/edu_grader_api/services/objective_prerequisites.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py
          python -m ruff check --config ruff.toml \
            services/generator/src/edu_generator/providers.py \
            apps/api/src/edu_grader_api/services/objective_prerequisites.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/roadmap.md')
          text = path.read_text(encoding='utf-8')
          old = '''- [x] PR #103：版本化 Profile/年级复杂度规则、E3/E4 语言篇幅信号、M1/M2 数值复杂度与 `verification-v6` / `rules-v6`；
- [ ] #83：剩余 Objective prerequisite、数学多解/定义域/增根漏根语义和容量 SLO；'''
          new = '''- [x] PR #103：版本化 Profile/年级复杂度规则、E3/E4 语言篇幅信号与 M1/M2 数值复杂度；
- [x] PR #105：Objective prerequisite 传递闭包门禁、稳定 finding 和 `verification-v7` / `rules-v7`；
- [ ] #83：剩余数学多解/定义域/增根漏根语义和容量 SLO；'''
          if old not in text:
              raise SystemExit('roadmap implementation status did not match expected baseline')
          text = text.replace(old, new, 1)
          text = text.replace('#83 课程/数学语义边界 ─┐', '#83 数学语义/容量边界 ─┐', 1)
          path.write_text(text, encoding='utf-8')
          PY
          python -m pytest \
            services/generator/tests \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py -q
      - name: Commit formatted reviewable branch
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/pr105-format-and-test.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: finalize objective prerequisite verification'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
