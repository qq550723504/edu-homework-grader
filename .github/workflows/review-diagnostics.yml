name: Review diagnostics

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: review-diagnostics-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Python packages
        run: make install-python
      - name: Produce formatted Python diagnostics
        run: |
          mkdir -p artifacts/review-diagnostics/formatted
          python -m ruff format \
            apps/api/src/edu_grader_api/services/ai_evaluation_gate.py \
            apps/api/tests/test_ai_evaluation_gate.py \
            apps/api/tests/test_openai_generation_integration.py
          cp apps/api/src/edu_grader_api/services/ai_evaluation_gate.py artifacts/review-diagnostics/formatted/
          cp apps/api/tests/test_ai_evaluation_gate.py artifacts/review-diagnostics/formatted/
          cp apps/api/tests/test_openai_generation_integration.py artifacts/review-diagnostics/formatted/
          git diff -- \
            apps/api/src/edu_grader_api/services/ai_evaluation_gate.py \
            apps/api/tests/test_ai_evaluation_gate.py \
            apps/api/tests/test_openai_generation_integration.py \
            > artifacts/review-diagnostics/ruff-format.diff
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Capture Web test output
        shell: bash
        run: |
          set +e
          cd apps/web
          npm test > ../../artifacts/review-diagnostics/web-test.log 2>&1
          echo $? > ../../artifacts/review-diagnostics/web-test.exit-code
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: review-diagnostics
          path: artifacts/review-diagnostics/
          if-no-files-found: error
          retention-days: 2
