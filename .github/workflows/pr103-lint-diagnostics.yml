name: PR 103 Ruff diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/grade-complexity-rules-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install packages
        run: make install-python >/dev/null
      - name: Capture effective Ruff installation and configuration
        shell: bash
        run: |
          set -euo pipefail
          {
            python -m ruff --version
            python -m pip show ruff
            echo '--- apps/api effective settings ---'
            python -m ruff check --show-settings apps/api/alembic/env.py | sed -n '1,220p'
          } > pr103-ruff-settings.txt
      - name: Persist diagnostic snapshot
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pr103-ruff-settings.txt
          git commit -m 'chore: capture effective Ruff settings'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
