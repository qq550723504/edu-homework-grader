name: PR 103 Ruff diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/grade-complexity-rules-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install packages
        run: make install-python >/dev/null
      - name: Show effective Ruff installation and configuration
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff --version
          python -m pip show ruff
          echo '--- apps/api effective settings ---'
          python -m ruff check --show-settings apps/api/alembic/env.py | sed -n '1,220p'
          echo '--- targeted lint ---'
          python -m ruff check \
            apps/api/src/edu_grader_api/services/curriculum_imports.py \
            apps/api/src/edu_grader_api/services/grade_complexity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_question_verification.py || true
