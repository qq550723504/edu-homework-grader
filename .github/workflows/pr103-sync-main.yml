name: PR 103 sync with main

on:
  push:
    branches:
      - agent/grade-complexity-rules-v1

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/grade-complexity-rules-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge current main and remove this one-shot workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
          git rm .github/workflows/pr103-sync-main.yml
          git commit --amend --no-edit
          git push origin HEAD:agent/grade-complexity-rules-v1
