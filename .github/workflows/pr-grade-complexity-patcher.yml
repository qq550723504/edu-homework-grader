name: PR grade complexity targeted fixer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix-and-test:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/grade-complexity-rules-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Python packages
        run: make install-python

      - name: Apply safe Ruff fixes and formatting
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check --fix --exit-zero \
            apps/api/src/edu_grader_api/services/curriculum_imports.py \
            apps/api/src/edu_grader_api/services/grade_complexity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_question_verification.py
          python -m ruff format \
            apps/api/src/edu_grader_api/services/curriculum_imports.py \
            apps/api/src/edu_grader_api/services/grade_complexity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_question_verification.py

      - name: Persist safe fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            apps/api/src/edu_grader_api/services/curriculum_imports.py \
            apps/api/src/edu_grader_api/services/grade_complexity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_question_verification.py
          if ! git diff --cached --quiet; then
            git commit -m 'style: normalize grade complexity slice'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Run targeted tests
        run: |
          python -m pytest \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_curriculum_imports.py \
            apps/api/tests/test_question_verification.py -q
