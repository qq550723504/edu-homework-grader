name: PR grade complexity targeted diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/grade-complexity-rules-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Python packages
        run: make install-python

      - name: Run targeted diagnostics
        id: diagnostics
        shell: bash
        run: |
          set +e
          : > targeted-grade-complexity.log
          python -m ruff check \
            apps/api/src/edu_grader_api/services/curriculum_imports.py \
            apps/api/src/edu_grader_api/services/grade_complexity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_question_verification.py \
            >> targeted-grade-complexity.log 2>&1
          lint_status=$?
          python -m pytest \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_curriculum_imports.py \
            apps/api/tests/test_question_verification.py -q \
            >> targeted-grade-complexity.log 2>&1
          test_status=$?
          cat targeted-grade-complexity.log
          status=$lint_status
          if [[ $test_status -ne 0 ]]; then
            status=$test_status
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persist diagnostic log
        if: steps.diagnostics.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f targeted-grade-complexity.log
          git commit -m 'chore: capture targeted grade complexity failures'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 1

      - name: Confirm targeted checks
        if: steps.diagnostics.outputs.status == '0'
        run: rm -f targeted-grade-complexity.log
