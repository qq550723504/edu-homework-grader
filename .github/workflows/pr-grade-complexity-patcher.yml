name: PR grade complexity one-shot patcher

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/grade-complexity-rules-v1' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      - name: Apply grade-complexity integration patch
        shell: bash
        run: |
          set -euo pipefail
          cat .patch_grade_complexity/part*.pyfrag > /tmp/patch_grade_complexity_slice.py
          python -m py_compile /tmp/patch_grade_complexity_slice.py
          python /tmp/patch_grade_complexity_slice.py

      - name: Install Python packages
        run: make install-python

      - name: Format integrated slice
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff format \
            apps/api/src/edu_grader_api/services/curriculum_imports.py \
            apps/api/src/edu_grader_api/services/grade_complexity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_question_verification.py

      - name: Persist integrated source and tests
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            apps/api/src/edu_grader_api/services/curriculum_imports.py \
            apps/api/src/edu_grader_api/services/grade_complexity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_question_verification.py
          if ! git diff --cached --quiet; then
            git commit -m 'feat: integrate versioned grade complexity verification'
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Lint and run targeted tests
        shell: bash
        run: |
          set -euo pipefail
          python -m ruff check \
            apps/api/src/edu_grader_api/services/curriculum_imports.py \
            apps/api/src/edu_grader_api/services/grade_complexity.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_question_verification.py
          python -m pytest \
            apps/api/tests/test_grade_complexity.py \
            apps/api/tests/test_curriculum_imports.py \
            apps/api/tests/test_question_verification.py -q
