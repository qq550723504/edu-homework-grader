name: Live OpenAI generator v3 acceptance

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-openai-v3-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  live-openai-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      LIVE_OPENAI_GENERATION: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || secrets.GENERATOR_OPENAI_API_KEY }}
      GENERATOR_OPENAI_MODEL: ${{ vars.GENERATOR_OPENAI_MODEL || secrets.GENERATOR_OPENAI_MODEL || 'gpt-5.6-terra' }}
      GENERATOR_OPENAI_BASE_URL: ${{ vars.GENERATOR_OPENAI_BASE_URL || secrets.GENERATOR_OPENAI_BASE_URL || 'https://api.openai.com/v1' }}
      GENERATOR_PROVIDER_ALLOWED_HOSTS: ${{ vars.GENERATOR_PROVIDER_ALLOWED_HOSTS || secrets.GENERATOR_PROVIDER_ALLOWED_HOSTS || 'api.openai.com' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Require controlled provider credentials
        shell: bash
        run: |
          if [[ -z "$OPENAI_API_KEY" ]]; then
            echo "::error::OPENAI_API_KEY or GENERATOR_OPENAI_API_KEY is not configured for controlled acceptance."
            exit 1
          fi
      - name: Install provider integration dependencies
        run: make install-python
      - name: Exercise generator-v3 against the controlled provider
        run: python -m pytest apps/api/tests/test_openai_generation_integration.py -q
