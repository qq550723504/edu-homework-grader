name: Governance foundation autofix

on:
  push:
    branches:
      - codex/ai-generation-governance-pr1

permissions:
  contents: write

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/ai-generation-governance-pr1
      - name: Apply focused source edits
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path('apps/api/tests/test_curriculum_models.py')
          text = test_path.read_text(encoding='utf-8')
          text = text.replace(
              'assert script.get_current_head() == "0023_generation_batch_acceptances"',
              'assert script.get_current_head() == "0024_generation_governance_entries"',
          )
          test_path.write_text(text, encoding='utf-8')

          model_path = Path('apps/api/src/edu_grader_api/models.py')
          text = model_path.read_text(encoding='utf-8')
          old = '''    __table_args__ = (\n        CheckConstraint(\n            "is_global OR tenant_id IS NOT NULL",\n            name="ck_generation_governance_requires_tenant_for_tenant_scope",\n        ),\n        Index(\n            "ix_generation_governance_scope", "tenant_id", "is_global", "target_type", "target_key"\n        ),\n        Index("ix_generation_governance_global_scope", "is_global", "target_type", "target_key"),\n    )'''
          new = '''    __table_args__ = (\n        CheckConstraint(\n            "(is_global = true AND tenant_id IS NULL) OR "\n            "(is_global = false AND tenant_id IS NOT NULL)",\n            name="ck_generation_governance_scope_is_consistent",\n        ),\n        Index(\n            "uq_generation_governance_global_target",\n            "target_type",\n            "target_key",\n            unique=True,\n            postgresql_where=text("is_global"),\n            sqlite_where=text("is_global = 1"),\n        ),\n        Index(\n            "uq_generation_governance_tenant_target",\n            "tenant_id",\n            "target_type",\n            "target_key",\n            unique=True,\n            postgresql_where=text("NOT is_global"),\n            sqlite_where=text("is_global = 0"),\n        ),\n    )'''
          if old not in text and new not in text:
              raise SystemExit('expected governance model block was not found')
          text = text.replace(old, new)
          model_path.write_text(text, encoding='utf-8')
          PY
      - name: Commit focused edits
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/src/edu_grader_api/models.py apps/api/tests/test_curriculum_models.py
          git commit -m "fix(db): align governance metadata and migration head"
          git push origin HEAD:codex/ai-generation-governance-pr1
