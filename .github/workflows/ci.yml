name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      non_docs: ${{ steps.filter.outputs.non_docs }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          predicate-quantifier: every
          filters: |
            non_docs:
              - '**'
              - '!docs/**'
              - '!**/*.md'

  python:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip docs-only pull request
        if: needs.changes.outputs.non_docs != 'true'
        run: echo "Skipping Python checks for a docs-only pull request."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.non_docs == 'true'
      - uses: actions/setup-python@v5
        if: needs.changes.outputs.non_docs == 'true'
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Python packages
        if: needs.changes.outputs.non_docs == 'true'
        run: make install-python
      - name: Check Python formatting
        if: needs.changes.outputs.non_docs == 'true'
        run: make ruff-version-check && python -m ruff format --check packages/processor-policy services/generator apps/api services/grader
      - name: Lint Python
        if: needs.changes.outputs.non_docs == 'true'
        run: python -m ruff check --config ruff.toml packages/processor-policy services/generator apps/api services/grader
      - name: Test Python packages
        if: needs.changes.outputs.non_docs == 'true'
        run: make test
      - name: Run deterministic verification corpus
        if: needs.changes.outputs.non_docs == 'true'
        run: make verification-regression

  migrations:
    needs: changes
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edu_grader
          POSTGRES_USER: edu_grader
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U edu_grader -d edu_grader"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://edu_grader:ci-postgres-password@localhost:5432/edu_grader
      POSTGRES_PASSWORD: ci-postgres-password
      AUDIT_HMAC_KEY: ci-only-audit-key-at-least-thirty-two-bytes
      KEYCLOAK_ADMIN_USERNAME: ci-keycloak-admin
      KEYCLOAK_ADMIN_PASSWORD: ci-keycloak-admin-password
      KEYCLOAK_POSTGRES_PASSWORD: ci-keycloak-postgres-password
    steps:
      - name: Skip docs-only pull request
        if: needs.changes.outputs.non_docs != 'true'
        run: echo "Skipping migration checks for a docs-only pull request."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.non_docs == 'true'
      - uses: actions/setup-python@v5
        if: needs.changes.outputs.non_docs == 'true'
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Python packages
        if: needs.changes.outputs.non_docs == 'true'
        run: make install-python
      - name: Upgrade, downgrade, and re-upgrade migrations
        if: needs.changes.outputs.non_docs == 'true'
        run: |
          python -m alembic -c apps/api/alembic.ini upgrade head
          python -m alembic -c apps/api/alembic.ini downgrade base
          python -m alembic -c apps/api/alembic.ini upgrade head

  compose:
    needs: changes
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      DATABASE_URL: postgresql+psycopg://edu_grader:ci-postgres-password@postgres:5432/edu_grader
      AUDIT_HMAC_KEY: ci-only-audit-key-at-least-thirty-two-bytes
      KEYCLOAK_ADMIN_USERNAME: ci-keycloak-admin
      KEYCLOAK_ADMIN_PASSWORD: ci-keycloak-admin-password
      KEYCLOAK_POSTGRES_PASSWORD: ci-keycloak-postgres-password
    steps:
      - name: Skip docs-only pull request
        if: needs.changes.outputs.non_docs != 'true'
        run: echo "Skipping Compose checks for a docs-only pull request."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.non_docs == 'true'
      - uses: docker/setup-buildx-action@v4
        if: needs.changes.outputs.non_docs == 'true'
      - name: Validate Compose configuration
        if: needs.changes.outputs.non_docs == 'true'
        run: docker compose config --quiet
      - name: Build application images
        if: needs.changes.outputs.non_docs == 'true'
        uses: docker/bake-action@v7
        with:
          source: .
          files: |
            compose.yaml
            docker-bake.ci.hcl
          targets: api,web
          load: true

  live-grader-integration:
    needs: changes
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: ci-postgres-password
      DATABASE_URL: postgresql+psycopg://edu_grader:ci-postgres-password@postgres:5432/edu_grader
      AUDIT_HMAC_KEY: ci-only-audit-key-at-least-thirty-two-bytes
      KEYCLOAK_ADMIN_USERNAME: ci-keycloak-admin
      KEYCLOAK_ADMIN_PASSWORD: ci-keycloak-admin-password
      KEYCLOAK_POSTGRES_PASSWORD: ci-keycloak-postgres-password
    steps:
      - name: Skip docs-only pull request
        if: needs.changes.outputs.non_docs != 'true'
        run: echo "Skipping live Grader checks for a docs-only pull request."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.non_docs == 'true'
      - uses: docker/setup-buildx-action@v4
        if: needs.changes.outputs.non_docs == 'true'
      - uses: actions/setup-python@v5
        if: needs.changes.outputs.non_docs == 'true'
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Core API and Grader packages
        if: needs.changes.outputs.non_docs == 'true'
        run: make install-python
      - name: Build real Grader dependencies
        if: needs.changes.outputs.non_docs == 'true'
        uses: docker/bake-action@v7
        with:
          source: .
          files: |
            compose.yaml
            docker-bake.ci.hcl
          targets: grader,languagetool
          load: true
      - name: Start real Grader dependencies
        if: needs.changes.outputs.non_docs == 'true'
        run: docker compose up --detach --wait --no-build languagetool grader
      - name: Exercise Core API HTTP Grader adapter
        if: needs.changes.outputs.non_docs == 'true'
        env:
          LIVE_GRADER_INTEGRATION: "1"
          GRADER_BASE_URL: http://localhost:8010
        run: python -m pytest apps/api/tests/test_live_grader_integration.py -q
      - name: Collect Grader logs
        if: needs.changes.outputs.non_docs == 'true' && always()
        run: docker compose logs grader languagetool
      - name: Stop Grader dependencies
        if: needs.changes.outputs.non_docs == 'true' && always()
        run: docker compose down --volumes --remove-orphans

  web:
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Skip docs-only pull request
        if: needs.changes.outputs.non_docs != 'true'
        working-directory: .
        run: echo "Skipping web checks for a docs-only pull request."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.non_docs == 'true'
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.non_docs == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-python@v5
        if: needs.changes.outputs.non_docs == 'true'
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Python API runtime
        if: needs.changes.outputs.non_docs == 'true'
        working-directory: .
        run: make install-python
      - name: Install web dependencies
        if: needs.changes.outputs.non_docs == 'true'
        run: npm ci
      - name: Run unit tests
        if: needs.changes.outputs.non_docs == 'true'
        run: npm test
      - name: Build web application
        if: needs.changes.outputs.non_docs == 'true'
        run: npm run build
      - name: Test E2E process supervisor
        if: needs.changes.outputs.non_docs == 'true'
        run: npm run test:e2e-runtime

  browser-e2e:
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Skip docs-only pull request
        if: needs.changes.outputs.non_docs != 'true'
        working-directory: .
        run: echo "Skipping browser E2E for a docs-only pull request."
      - uses: actions/checkout@v4
        if: needs.changes.outputs.non_docs == 'true'
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.non_docs == 'true'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - uses: actions/setup-python@v5
        if: needs.changes.outputs.non_docs == 'true'
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Python API runtime
        if: needs.changes.outputs.non_docs == 'true'
        working-directory: .
        run: make install-python
      - name: Install web dependencies
        if: needs.changes.outputs.non_docs == 'true'
        run: npm ci
      - name: Install Chromium
        if: needs.changes.outputs.non_docs == 'true'
        run: npx playwright install --with-deps chromium
      - name: Run student vertical-slice browser acceptance
        if: needs.changes.outputs.non_docs == 'true'
        run: npm run test:e2e
      - name: Upload browser artifacts
        if: needs.changes.outputs.non_docs == 'true' && failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
