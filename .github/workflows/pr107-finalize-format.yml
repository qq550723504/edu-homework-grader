name: PR 107 finalize formatting

on:
  push:
    branches:
      - agent/math-semantics-support-matrix-v1

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/math-semantics-support-matrix-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Format and validate math semantics integration
        shell: bash
        run: |
          set -euo pipefail
          make install-python >/dev/null
          python -m ruff format \
            apps/api/src/edu_grader_api/services/math_semantics.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_math_semantics.py \
            apps/api/tests/test_question_verification.py
          python -m ruff check --config ruff.toml \
            apps/api/src/edu_grader_api/services/math_semantics.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_math_semantics.py \
            apps/api/tests/test_question_verification.py
          python -m pytest \
            apps/api/tests/test_math_semantics.py \
            apps/api/tests/test_question_verification.py -q
          python scripts/check_docs_status.py
      - name: Commit reviewable branch
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/workflows/pr107-finalize-format.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: finalize math semantics verification'
          git push origin HEAD:agent/math-semantics-support-matrix-v1
