name: PR 104 CI command patcher

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/pin-ruff-toolchain' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Make CI use the pinned lint policy
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path(".github/workflows/ci.yml")
          text = path.read_text(encoding="utf-8")
          old_format = "run: python -m ruff format --check packages/processor-policy services/generator apps/api services/grader"
          new_format = "run: make ruff-version-check && python -m ruff format --check packages/processor-policy services/generator apps/api services/grader"
          old_lint = "run: python -m ruff check packages/processor-policy services/generator apps/api services/grader"
          new_lint = "run: python -m ruff check --config ruff.toml packages/processor-policy services/generator apps/api services/grader"
          if text.count(old_format) != 1 or text.count(old_lint) != 1:
              raise SystemExit("CI Ruff commands did not match the expected baseline")
          path.write_text(
              text.replace(old_format, new_format, 1).replace(old_lint, new_lint, 1),
              encoding="utf-8",
          )
          PY
          git rm .github/workflows/pr104-ci-patcher.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'ci: enforce the pinned Ruff policy'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
