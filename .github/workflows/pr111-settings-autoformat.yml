name: PR 111 settings autoformat

on:
  push:
    branches:
      - agent/verification-budget-v1

permissions:
  contents: write

jobs:
  format-settings:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/verification-budget-v1
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply pinned formatter and self-delete
        run: |
          set -euo pipefail
          python -m pip install 'ruff==0.16.0'
          python -m ruff format apps/api/src/edu_grader_api/settings.py
          rm -f .github/workflows/pr111-settings-autoformat.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'style: format verification timeout settings'
          git push origin HEAD:agent/verification-budget-v1
