name: Governance diagnostics

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install Python packages
        run: make install-python
      - name: Capture Python failures
        id: python
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest packages/processor-policy/tests services/generator/tests apps/api/tests services/grader/tests -q --tb=long 2>&1 | tee python-tests.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install Web dependencies
        run: cd apps/web && npm ci
      - name: Capture E2E runtime failures
        id: runtime
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd apps/web
          npm run test:e2e-runtime 2>&1 | tee ../../e2e-runtime.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: governance-diagnostics
          path: |
            python-tests.txt
            e2e-runtime.txt
          retention-days: 2
      - name: Fail when diagnostics found errors
        if: steps.python.outcome == 'failure' || steps.runtime.outcome == 'failure'
        run: exit 1
