name: Objective prerequisite verification patcher

on:
  push:
    branches:
      - agent/objective-prerequisite-verification-v1

permissions:
  contents: write

concurrency:
  group: objective-prerequisite-patcher
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/objective-prerequisite-verification-v1
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply, format, and commit the integration
        shell: bash
        run: |
          set -euo pipefail
          python scripts/apply_objective_prerequisite_integration.py
          python -m pip install ruff==0.16.0 >/dev/null
          python -m ruff format \
            apps/api/src/edu_grader_api/services/objective_prerequisites.py \
            apps/api/src/edu_grader_api/services/question_verification.py \
            apps/api/tests/test_objective_prerequisites.py \
            apps/api/tests/test_question_verification.py
          git rm \
            .github/workflows/prerequisite-gate-patcher.yml \
            scripts/apply_objective_prerequisite_integration.py
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: enforce objective prerequisite alignment'
          git push origin HEAD:agent/objective-prerequisite-verification-v1
