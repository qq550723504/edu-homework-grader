name: PR 104 lint diagnostics

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/pin-ruff-toolchain' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
      - name: Install packages
        run: make install-python >/dev/null
      - name: Capture full lint output
        shell: bash
        run: |
          set +e
          python -m ruff check --config ruff.toml packages/processor-policy services/generator apps/api services/grader > pr104-lint.log 2>&1
          status=$?
          cat pr104-lint.log
          printf '\nexit_status=%s\n' "$status" >> pr104-lint.log
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pr104-lint.log
          git commit -m 'chore: capture PR 104 lint diagnostics'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
          exit 0
