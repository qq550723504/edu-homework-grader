name: Publish production images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            file: apps/api/Dockerfile
          - name: grader
            context: .
            file: services/grader/Dockerfile
          - name: web
            context: apps/web
            file: apps/web/Dockerfile
          - name: languagetool
            context: infra/languagetool
            file: infra/languagetool/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/edu-homework-grader-${{ matrix.name }}:${{ github.sha }}
