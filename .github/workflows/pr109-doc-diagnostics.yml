name: PR 109 docs diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostics:
    if: github.event.pull_request.number == 109
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Capture docs integrity output
        shell: bash
        run: |
          set +e
          mkdir -p pr109-doc-diagnostics
          python scripts/check_docs_status.py > pr109-doc-diagnostics/check.log 2>&1
          status=$?
          printf 'status=%s\n' "$status" > pr109-doc-diagnostics/status.txt
          exit 0
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pr109-doc-diagnostics
          path: pr109-doc-diagnostics
